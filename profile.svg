<svg width="680" height="410" viewBox="0 0 680 410" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&amp;family=Sora:wght@300;400;500&amp;display=swap');

    :root {
      /* Aydınlık Tema Renkleri (Varsayılan) */
      --color-name: #1F2328;
      --color-title: #65717D;
      --color-bio: #65717D;
      --color-label: #8C959F;
      --color-tag-text: #65717D;
      --color-border: #D0D7DE;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        /* Karanlık Tema Renkleri */
        --color-name: #e6edf3;
        --color-title: #8b949e;
        --color-bio: #8b949e;
        --color-label: #484f58;
        --color-tag-text: #8b949e;
        --color-border: #30363d;
      }
    }

    .name { font: 500 22px 'Sora', sans-serif; fill: var(--color-name); }
    .title { font: 300 13px 'Sora', sans-serif; fill: var(--color-title); text-transform: uppercase; letter-spacing: 0.5px; }
    .bio { font: 300 15px 'Sora', sans-serif; fill: var(--color-bio); }
    .label { font: 400 11px 'DM Mono', monospace; fill: var(--color-label); letter-spacing: 1.5px; text-transform: uppercase; }
    .tag-text { font: 400 12px 'DM Mono', monospace; fill: var(--color-tag-text); }
    .tag-rect { stroke: var(--color-border); stroke-width: 0.4; rx: 4; }
    .divider { stroke: var(--color-border); stroke-width: 0.5; }
  </style>

  <!-- Name & Subtitle -->
  <text x="0" y="30" class="name">Morphe</text>
  <text x="0" y="55" class="title">Frontend Developer</text>

  <!-- Bio -->
  <text x="0" y="95" class="bio">Building accessible, high-performance web interfaces. Focused on SPAs,</text>
  <text x="0" y="117" class="bio">design systems, and API-driven UIs with a strong emphasis on</text>
  <text x="0" y="139" class="bio">accessibility and smooth interactions.</text>

  <!-- Divider 1 -->
  <line x1="0" y1="175" x2="680" y2="175" class="divider" />

  <!-- Stack Section -->
  <text x="0" y="200" class="label">Stack</text>
  <g transform="translate(0, 215)">
    <rect width="55" height="26" class="tag-rect"/><text x="27.5" y="17" text-anchor="middle" class="tag-text">HTML5</text>
    <rect x="61" width="45" height="26" class="tag-rect"/><text x="83.5" y="17" text-anchor="middle" class="tag-text">CSS3</text>
    <rect x="112" width="85" height="26" class="tag-rect"/><text x="154.5" y="17" text-anchor="middle" class="tag-text">JavaScript</text>
    <rect x="203" width="85" height="26" class="tag-rect"/><text x="245.5" y="17" text-anchor="middle" class="tag-text">TypeScript</text>
    <rect x="294" width="60" height="26" class="tag-rect"/><text x="324" y="17" text-anchor="middle" class="tag-text">Vue.js</text>
    <rect x="360" width="65" height="26" class="tag-rect"/><text x="392.5" y="17" text-anchor="middle" class="tag-text">Vuetify</text>
    <rect x="431" width="95" height="26" class="tag-rect"/><text x="478.5" y="17" text-anchor="middle" class="tag-text">Tailwind CSS</text>
  </g>
  <g transform="translate(0, 247)">
    <rect width="80" height="26" class="tag-rect"/><text x="40" y="17" text-anchor="middle" class="tag-text">Bootstrap</text>
    <rect x="86" width="55" height="26" class="tag-rect"/><text x="113.5" y="17" text-anchor="middle" class="tag-text">jQuery</text>
    <rect x="147" width="100" height="26" class="tag-rect"/><text x="197" y="17" text-anchor="middle" class="tag-text">Handlebars.js</text>
    <rect x="253" width="70" height="26" class="tag-rect"/><text x="288" y="17" text-anchor="middle" class="tag-text">Electron</text>
    <rect x="329" width="40" height="26" class="tag-rect"/><text x="349" y="17" text-anchor="middle" class="tag-text">Git</text>
    <rect x="375" width="50" height="26" class="tag-rect"/><text x="400" y="17" text-anchor="middle" class="tag-text">Figma</text>
    <rect x="431" width="50" height="26" class="tag-rect"/><text x="456" y="17" text-anchor="middle" class="tag-text">Linux</text>
  </g>

  <!-- Divider 2 -->
  <line x1="0" y1="310" x2="680" y2="310" class="divider" />

  <!-- Design Section -->
  <text x="0" y="335" class="label">Design &amp; 3D</text>
  <g transform="translate(0, 350)">
    <rect width="65" height="26" class="tag-rect"/><text x="32.5" y="17" text-anchor="middle" class="tag-text">Blender</text>
    <rect x="71" width="65" height="26" class="tag-rect"/><text x="103.5" y="17" text-anchor="middle" class="tag-text">3ds Max</text>
    <rect x="142" width="85" height="26" class="tag-rect"/><text x="184.5" y="17" text-anchor="middle" class="tag-text">Photoshop</text>
    <rect x="233" width="85" height="26" class="tag-rect"/><text x="275.5" y="17" text-anchor="middle" class="tag-text">Illustrator</text>
  </g>
</svg>
